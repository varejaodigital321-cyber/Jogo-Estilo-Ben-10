<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10151d" />
    <title>Forma Prisma</title>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">Forma Prisma · protótipo técnico</p>
        <h1>Forma Prisma</h1>
        <p class="subtitle">Forma original em animação idle sobre fundos claro e escuro.</p>
      </header>
      <section class="game-card" aria-label="Visualização da animação idle">
        <div id="game" aria-label="Área interativa do protótipo Forma Prisma"></div>
        <aside id="diagnostics">
          <h2>Detalhes técnicos</h2>
          <dl>
            <div><dt>Escala</dt><dd id="diag-scale">—</dd></div>
            <div><dt>Folha</dt><dd id="diag-sheet">1200 × 560 px</dd></div>
            <div><dt>Canal</dt><dd id="diag-alpha">RGBA</dd></div>
          </dl>
          <p id="asset-status" class="status">Carregando spritesheet…</p>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
