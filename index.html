<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#10151d" />
    <title>Auditoria da animação idle</title>
  </head>
  <body>
    <main class="app-shell">
      <header>
        <p class="eyebrow">Protótipo técnico · Etapa 1</p>
        <h1>Auditoria da animação idle</h1>
        <p class="subtitle">A divisão vertical permite conferir contornos e resíduos em fundos claro e escuro.</p>
      </header>
      <section class="game-card" aria-label="Visualização da animação idle">
        <div id="game" role="img" aria-label="Personagem animado sobre fundos claro e escuro"></div>
        <aside id="diagnostics" aria-live="polite">
          <h2>Diagnóstico</h2>
          <dl>
            <div><dt>FPS</dt><dd id="diag-fps">—</dd></div>
            <div><dt>Quadro atual</dt><dd id="diag-frame">—</dd></div>
            <div><dt>Escala</dt><dd id="diag-scale">—</dd></div>
            <div><dt>Folha original</dt><dd id="diag-sheet">1200 × 560 px</dd></div>
            <div><dt>Canal alfa</dt><dd id="diag-alpha">RGBA confirmado</dd></div>
          </dl>
          <p id="asset-status" class="status">Carregando spritesheet…</p>
        </aside>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
