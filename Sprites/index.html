<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teste da animação Idle</title>
<style>
  :root { color-scheme: dark; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    background: #111;
    font-family: system-ui, sans-serif;
  }
  main { text-align: center; }
  .stage {
    width: 300px;
    height: 560px;
    overflow: hidden;
    border: 1px solid #555;
    background-color: #d8d8d8;
    background-image:
      linear-gradient(45deg, #bdbdbd 25%, transparent 25%),
      linear-gradient(-45deg, #bdbdbd 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #bdbdbd 75%),
      linear-gradient(-45deg, transparent 75%, #bdbdbd 75%);
    background-size: 32px 32px;
    background-position: 0 0, 0 16px, 16px -16px, -16px 0;
  }
  .sprite {
    width: 300px;
    height: 560px;
    background-image: url("idle_sprite_sheet.png");
    background-repeat: no-repeat;
    animation: idle 0.90s steps(1) infinite;
  }
  @keyframes idle {
    0%, 24.9% { background-position: 0 0; }
    25%, 49.9% { background-position: -300px 0; }
    50%, 74.9% { background-position: -600px 0; }
    75%, 100% { background-position: -900px 0; }
  }
  p { color: #ddd; }
</style>
</head>
<body>
<main>
  <div class="stage"><div class="sprite" aria-label="Animação idle em quatro quadros"></div></div>
  <p>Idle — 4 quadros</p>
</main>
</body>
</html>
